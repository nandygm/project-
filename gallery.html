<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Memories</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-animation"></div>
    
    <div class="container gallery-page">
        <h1 class="title page-title">Our Memories</h1>
        
        <div class="gallery-grid">
            <!-- Image Card 1 -->
            <div class="photo-card glass-card">
                <div class="photo-placeholder">
                    <span>Add Photo Here</span>
                </div>
                <p class="photo-caption">One of my favorite memories with you</p>
            </div>
            
            <!-- Image Card 2 -->
            <div class="photo-card glass-card">
                <div class="photo-placeholder">
                    <span>Add Photo Here</span>
                </div>
                <p class="photo-caption">Moments that made me smile</p>
            </div>
            
            <!-- Image Card 3 -->
            <div class="photo-card glass-card">
                <div class="photo-placeholder">
                    <span>Add Photo Here</span>
                </div>
                <p class="photo-caption">Every memory with you is special</p>
            </div>
        </div>

        <div class="center-btn">
            <button id="continueBtn" class="glow-on-hover primary-btn">Continue</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

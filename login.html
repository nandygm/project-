<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to our little corner</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-animation"></div>
    <div class="container">
        <div class="card glass">
            <h1 class="title welcome-title">Welcome to the little corner of the internet that is made for you, Pillaa ❤️</h1>
            <p class="subtitle">This small space is made with love just for you.</p>
            
            <div id="action-area" class="action-area">
                <button id="openBtn" class="glow-on-hover primary-btn">Open this to start</button>
                
                <div id="success-message" class="hidden-element">
                    <p class="animated-text">You did it! Let's go ❤️</p>
                    <button id="letsGoBtn" class="glow-on-hover primary-btn mt-15">Let's Go</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
